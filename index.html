<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Shooter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin: 16px 0 10px;
      flex-shrink: 0;
    }

    canvas {
      background-color: #000000;
      display: block;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Space Shooter</h1>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Audio (Web Audio API, no external files needed) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Unlock AudioContext on first user gesture (required by browsers)
    let bgmStarted = false;
    function resumeAudio() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!bgmStarted) {
        bgmStarted = true;
        startBGM();
      }
    }
    document.addEventListener('keydown', resumeAudio, { once: false });

    // Short laser "pew" — high-pitched falling tone
    function playShootSound() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'square';
      const t = audioCtx.currentTime;
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.12);

      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);

      osc.start(t);
      osc.stop(t + 0.13);
    }

    // Explosion "boom" — noise burst with low thump
    function playExplosionSound() {
      const t = audioCtx.currentTime;

      // White-noise burst
      const bufferSize = audioCtx.sampleRate * 0.25;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(400, t);
      noiseFilter.frequency.exponentialRampToValueAtTime(80, t + 0.25);

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.6, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(t);
      noise.stop(t + 0.26);

      // Low-frequency thump
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.2);

      oscGain.gain.setValueAtTime(0.5, t);
      oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);

      osc.start(t);
      osc.stop(t + 0.21);
    }

    // --- Background Music (chiptune sequencer) ---
    // A looping two-bar melody over a bass line and a kick/hat rhythm.
    // Everything is synthesised — no audio files required.

    const BGM_TEMPO = 140; // BPM
    const BGM_STEP  = 60 / BGM_TEMPO / 4; // duration of one 16th note in seconds

    // Melody note sequence (frequencies, null = rest)
    // Two bars of 16 steps each, loops forever
    const NOTE  = f => f;  // helper for readability
    const _     = null;    // rest
    const bgmMelody = [
      // Bar 1
      NOTE(523.25), _, NOTE(659.25), _, NOTE(783.99), NOTE(659.25), NOTE(523.25), _,
      NOTE(440.00), _, NOTE(523.25), _, NOTE(659.25), _, NOTE(783.99), _,
      // Bar 2
      NOTE(880.00), _, NOTE(783.99), _, NOTE(659.25), NOTE(523.25), NOTE(440.00), _,
      NOTE(392.00), _, NOTE(440.00), _, NOTE(523.25), _, NOTE(659.25), _,
    ];

    // Bass line — one note per beat (quarter note = 4 steps)
    const bgmBass = [
      130.81, 130.81, 164.81, 164.81,  // bar 1 beats 1-4
      146.83, 146.83, 130.81, 130.81,  // bar 2 beats 1-4
    ];

    let bgmScheduler = null;   // setInterval handle
    let bgmStep      = 0;
    let bgmNextTime  = 0;
    let bgmPlaying   = false;

    // Master gain for BGM (quiet so it doesn't drown SFX)
    const bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.18;
    bgmGain.connect(audioCtx.destination);

    function bgmPlayNote(freq, startTime, duration, type = 'square', vol = 0.4) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(bgmGain);

      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);

      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(vol, startTime + 0.005); // small attack
      gain.gain.setValueAtTime(vol, startTime + duration * 0.7);
      gain.gain.linearRampToValueAtTime(0, startTime + duration); // release

      osc.start(startTime);
      osc.stop(startTime + duration + 0.01);
    }

    function bgmPlayKick(startTime) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(bgmGain);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, startTime);
      osc.frequency.exponentialRampToValueAtTime(30, startTime + 0.12);
      gain.gain.setValueAtTime(0.9, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
      osc.start(startTime);
      osc.stop(startTime + 0.19);
    }

    function bgmPlayHat(startTime) {
      const bufSize = audioCtx.sampleRate * 0.05;
      const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src  = audioCtx.createBufferSource();
      src.buffer = buf;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 6000;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.25, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(bgmGain);
      src.start(startTime);
      src.stop(startTime + 0.06);
    }

    // Lookahead scheduler — schedules ~200ms ahead, runs every 100ms
    const LOOKAHEAD = 0.2;  // seconds
    const SCHEDULE_INTERVAL = 100; // ms

    function bgmScheduleTick() {
      while (bgmNextTime < audioCtx.currentTime + LOOKAHEAD) {
        const stepIndex   = bgmStep % bgmMelody.length;
        const beatIndex   = Math.floor(bgmStep / 4) % bgmBass.length;
        const isDownbeat  = bgmStep % 4 === 0;
        const isOffbeat   = bgmStep % 4 === 2;

        // Melody
        const freq = bgmMelody[stepIndex];
        if (freq) {
          bgmPlayNote(freq, bgmNextTime, BGM_STEP * 0.85, 'square', 0.45);
        }

        // Bass (every beat)
        if (isDownbeat) {
          bgmPlayNote(bgmBass[beatIndex], bgmNextTime, BGM_STEP * 3.5, 'triangle', 0.55);
        }

        // Kick on beats 1 & 3
        if (bgmStep % 8 === 0 || bgmStep % 8 === 4) {
          bgmPlayKick(bgmNextTime);
        }

        // Hi-hat on every 16th note
        bgmPlayHat(bgmNextTime);

        bgmNextTime += BGM_STEP;
        bgmStep++;
      }
    }

    function startBGM() {
      if (bgmPlaying) return;
      bgmPlaying  = true;
      bgmStep     = 0;
      bgmNextTime = audioCtx.currentTime + 0.05;
      bgmScheduler = setInterval(bgmScheduleTick, SCHEDULE_INTERVAL);
    }

    function stopBGM() {
      if (!bgmPlaying) return;
      bgmPlaying = false;
      clearInterval(bgmScheduler);
      bgmScheduler = null;
    }

    // --- Resize canvas to fill the window below the heading ---
    function resizeCanvas() {
      const heading = document.querySelector('h1');
      const headingH = heading.offsetHeight + 26;
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight - headingH;

      // Three-layer parallax star field
      stars.length = 0;
      const totalStars = Math.floor((canvas.width * canvas.height) / 4000);
      for (let i = 0; i < totalStars; i++) {
        const layer = Math.floor(Math.random() * 3); // 0=far,1=mid,2=near
        stars.push({
          x:     Math.random() * canvas.width,
          y:     Math.random() * canvas.height,
          r:     layer === 0 ? 0.5 : layer === 1 ? 1.0 : 1.8,
          alpha: layer === 0 ? 0.4 : layer === 1 ? 0.7 : 1.0,
          speed: layer === 0 ? 0.2 : layer === 1 ? 0.5 : 1.0,
          twinkleOffset: Math.random() * Math.PI * 2
        });
      }

      player.y = canvas.height - 60;
      if (!gameOver) player.x = Math.min(Math.max(player.x, player.width / 2), canvas.width - player.width / 2);
    }

    window.addEventListener('resize', resizeCanvas);

    // --- Ship image ---
    const shipImg = new Image();
    shipImg.src = 'shooter.png';

    // --- Enemy image ---
    const enemyImg = new Image();
    enemyImg.src = 'enemy.png';

    // --- Boss image ---
    const bossImg = new Image();
    bossImg.src = 'boss enemy.webp';

    // --- Stars (three parallax layers) ---
    const stars = [];

    // --- Player ---
    const player = {
      x: canvas.width / 2,
      y: canvas.height - 60,
      width: 60,
      height: 60,
      speed: 10
    };

    // --- Score ---
    let score = 0;

    // --- Level system ---
    let level = 1;
    const POINTS_PER_LEVEL = 500; // score needed to advance each level

    function getLevel() {
      return Math.floor(score / POINTS_PER_LEVEL) + 1;
    }

    // Enemy speed and spawn interval scale with level
    function currentEnemySpeed() {
      return ENEMY_SPEED + (level - 1) * 0.5;
    }

    function currentSpawnInterval() {
      // Minimum 300ms so it never gets impossible
      return Math.max(300, ENEMY_SPAWN_INTERVAL - (level - 1) * 80);
    }

    // --- Lives & game state ---
    const MAX_LIVES = 200;
    let lives = MAX_LIVES;
    let gameOver = false;

    function resetGame() {
      score = 0;
      level = 1;
      lives = MAX_LIVES;
      gameOver = false;
      player.x = canvas.width / 2;
      player.y = canvas.height - 60;
      enemies.length = 0;
      bullets.length = 0;
      particles.length = 0;
      asteroids.length = 0;
      boss = null;
      lastShotTime = 0;
      lastSpawnTime = 0;
      lastBossTime = -BOSS_INTERVAL;
      activePowerUp = null;
      nextPowerUpTime = -1;
      rapidFireEnd = 0; tripleShotEnd = 0; speedBoostEnd = 0;
      freezeEnd = 0; magnetEnd = 0; scoreBoostEnd = 0;
      rainbowEnd = 0; blackHoleActive = false; blackHoleTimer = 0;
      bgAngle = 0; bgOffset = 0;
      lastFrameTime = performance.now();
      startBGM();
    }

    function drawScore() {
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px Arial';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 12, 12);
    }

    function drawLevel() {
      ctx.fillStyle = '#ffdd00';
      ctx.font = '18px Arial';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'center';
      ctx.fillText('Level ' + level, canvas.width / 2, 12);
      ctx.textAlign = 'left';
    }

    function drawLives() {
      ctx.fillStyle = '#ffffff';
      ctx.font = '18px Arial';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, canvas.width - 12, 12);
      ctx.textAlign = 'left'; // reset to default
    }

    function drawGameOver() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';

      // "GAME OVER" title
      ctx.fillStyle = '#ff2222';
      ctx.font = 'bold 72px Arial';
      ctx.textBaseline = 'middle';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

      // Final score
      ctx.fillStyle = '#ffffff';
      ctx.font = '28px Arial';
      ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);

      // Level reached
      ctx.fillStyle = '#ffdd00';
      ctx.font = '22px Arial';
      ctx.fillText('Level Reached: ' + level, canvas.width / 2, canvas.height / 2 + 45);

      // Restart prompt
      ctx.font = '20px Arial';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText('Press R to Restart', canvas.width / 2, canvas.height / 2 + 80);

      ctx.textAlign = 'left'; // reset
    }

    // =====================================================================
    // --- POWER-UP SYSTEM (unified, one-at-a-time spawner) ---
    // =====================================================================
    const POWERUP_RADIUS = 16;
    const POWERUP_SPEED  = 2;

    // Active effect timers (0 = inactive)
    let rapidFireEnd   = 0;
    let tripleShotEnd  = 0;
    let speedBoostEnd  = 0;
    let freezeEnd      = 0;
    let magnetEnd      = 0;
    let scoreBoostEnd  = 0;
    let rainbowEnd     = 0;
    let blackHoleActive = false;
    let blackHoleTimer  = 0;   // ms remaining
    let blackHoleX = 0, blackHoleY = 0;

    const RAPIDFIRE_DURATION  = 5000;
    const TRIPLESHOT_DURATION = 8000;
    const SPEEDBOOST_DURATION = 8000;
    const FREEZE_DURATION     = 6000;
    const MAGNET_DURATION     = 10000;
    const SCOREBOOST_DURATION = 15000;
    const RAINBOW_DURATION    = 10000;
    const BLACKHOLE_DURATION  = 5000;

    function isRapidFire()  { const n = performance.now(); return n < rapidFireEnd  || n < rainbowEnd; }
    function isTripleShot() { const n = performance.now(); return n < tripleShotEnd || n < rainbowEnd; }
    function isSpeedBoost() { return performance.now() < speedBoostEnd; }
    function isFreeze()     { return performance.now() < freezeEnd; }
    function isMagnet()     { return performance.now() < magnetEnd; }
    function isScoreBoost() { return performance.now() < scoreBoostEnd; }

    function activateRapidFire()  { rapidFireEnd   = performance.now() + RAPIDFIRE_DURATION; }
    function activateTripleShot() { tripleShotEnd  = performance.now() + TRIPLESHOT_DURATION; }
    function activateSpeedBoost() { speedBoostEnd  = performance.now() + SPEEDBOOST_DURATION; }
    function activateFreeze()     { freezeEnd      = performance.now() + FREEZE_DURATION; }
    function activateMagnet()     { magnetEnd      = performance.now() + MAGNET_DURATION; }
    function activateScoreBoost() { scoreBoostEnd  = performance.now() + SCOREBOOST_DURATION; }
    function activateRainbow()    { rainbowEnd     = performance.now() + RAINBOW_DURATION; }
    function activateBlackHole()  {
      blackHoleActive = true;
      blackHoleTimer  = BLACKHOLE_DURATION;
      blackHoleX = canvas.width / 2;
      blackHoleY = canvas.height / 2;
    }

    // --- Power-up type catalogue ---
    // weight: relative spawn probability (higher = more common)
    const POWERUP_TYPES = [
      { id: 'rapidfire',   weight: 18, icon: '⚡', color: '#00ff88', label: 'RAPID FIRE'   },
      { id: 'tripleshot',  weight: 15, icon: '▲', color: '#ff8800', label: 'TRIPLE SHOT'  },
      { id: 'repair',      weight: 16, icon: '❤', color: '#ff2244', label: 'REPAIR'        },
      { id: 'nova',        weight: 10, icon: '💣', color: '#cc44ff', label: 'NOVA BOMB'    },
      { id: 'freeze',      weight: 12, icon: '❄', color: '#44ddff', label: 'FREEZE'        },
      { id: 'magnet',      weight: 10, icon: '🧲', color: '#ffee00', label: 'MAGNET'       },
      { id: 'speedboost',  weight: 12, icon: '🚀', color: '#ffffff', label: 'SPEED BOOST'  },
      { id: 'scoreboost',  weight: 8,  icon: '⭐', color: '#ffd700', label: 'SCORE BOOST'  },
      { id: 'rainbow',     weight: 2,  icon: '🌈', color: 'rainbow', label: 'RAINBOW CORE' },
      { id: 'blackhole',   weight: 2,  icon: '🕳', color: '#110022', label: 'BLACK HOLE'   },
    ];
    const TOTAL_WEIGHT = POWERUP_TYPES.reduce((s, t) => s + t.weight, 0);

    function pickRandomPowerUpType() {
      let r = Math.random() * TOTAL_WEIGHT;
      for (const t of POWERUP_TYPES) { r -= t.weight; if (r <= 0) return t; }
      return POWERUP_TYPES[0];
    }

    // --- Single active power-up on screen ---
    let activePowerUp = null;          // { x, y, type }
    let nextPowerUpTime = -1;          // performance.now() timestamp when next should spawn

    function schedulNextPowerUp() {
      const delay = (15 + Math.random() * 15) * 1000;
      nextPowerUpTime = performance.now() + delay;
    }

    function spawnPowerUp() {
      const type = pickRandomPowerUpType();
      activePowerUp = {
        x: POWERUP_RADIUS + Math.random() * (canvas.width - POWERUP_RADIUS * 2),
        y: -POWERUP_RADIUS,
        type
      };
    }

    // --- Power-up sound ---
    function playPowerUpSound(pitch = 1) {
      const t = audioCtx.currentTime;
      [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.value = f * pitch;
        const s = t + i * 0.08;
        gain.gain.setValueAtTime(0, s);
        gain.gain.linearRampToValueAtTime(0.22, s + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, s + 0.25);
        osc.start(s); osc.stop(s + 0.26);
      });
    }

    // --- Collect handler ---
    function collectPowerUp(typeObj) {
      const id  = typeObj.id;
      const now = performance.now();
      playPowerUpSound(id === 'rainbow');

      if (id === 'rapidfire')  { rapidFireEnd   = now + RAPIDFIRE_DURATION;  return; }
      if (id === 'tripleshot') { tripleShotEnd  = now + TRIPLESHOT_DURATION; return; }
      if (id === 'speedboost') { speedBoostEnd  = now + SPEEDBOOST_DURATION; return; }
      if (id === 'freeze')     { freezeEnd      = now + FREEZE_DURATION;     return; }
      if (id === 'magnet')     { magnetEnd      = now + MAGNET_DURATION;     return; }
      if (id === 'scoreboost') { scoreBoostEnd  = now + SCOREBOOST_DURATION; return; }
      if (id === 'rainbow') {
        rainbowEnd    = now + RAINBOW_DURATION;
        rapidFireEnd  = now + RAINBOW_DURATION;
        tripleShotEnd = now + RAINBOW_DURATION;
        return;
      }
      if (id === 'repair') {
        if (lives < MAX_LIVES) lives++;
        return;
      }
      if (id === 'nova') {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          spawnExplosion(e.x + ENEMY_SIZE / 2, e.y + ENEMY_SIZE / 2);
          score += isScoreBoost() ? 20 : 10;
        }
        enemies.length = 0;
        playExplosionSound();
        return;
      }
      if (id === 'blackhole') {
        blackHoleActive = true;
        blackHoleTimer  = BLACKHOLE_DURATION;
        blackHoleX = canvas.width  / 2;
        blackHoleY = canvas.height / 2;
        return;
      }
    }

    // --- Draw single power-up ---
    function drawPowerUps() {
      if (!activePowerUp) return;
      const { x, y, type } = activePowerUp;
      const now = performance.now();
      const pulse = 0.6 + 0.4 * Math.sin(now * 0.005 + x);
      ctx.save();

      if (type.color === 'rainbow') {
        // Rainbow spinning hue
        const hue = (now * 0.1) % 360;
        ctx.shadowColor = `hsl(${hue},100%,60%)`;
        ctx.shadowBlur = 16 * pulse;
        const rg = ctx.createRadialGradient(x, y, 2, x, y, POWERUP_RADIUS);
        rg.addColorStop(0, `hsl(${hue},100%,80%)`);
        rg.addColorStop(1, `hsl(${(hue+120)%360},100%,40%)`);
        ctx.fillStyle = rg;
      } else if (type.id === 'blackhole') {
        ctx.shadowColor = '#aa00ff';
        ctx.shadowBlur = 20 * pulse;
        const bg = ctx.createRadialGradient(x, y, 2, x, y, POWERUP_RADIUS);
        bg.addColorStop(0, '#330044');
        bg.addColorStop(0.6, '#110022');
        bg.addColorStop(1, '#000000');
        ctx.fillStyle = bg;
      } else {
        ctx.shadowColor = type.color;
        ctx.shadowBlur = 12 * pulse;
        const g = ctx.createRadialGradient(x, y, 2, x, y, POWERUP_RADIUS);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(1, type.color);
        ctx.fillStyle = g;
      }

      ctx.beginPath();
      ctx.arc(x, y, POWERUP_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${type.id === 'blackhole' ? 14 : 14}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(type.icon, x, y);
      // Small label below
      ctx.font = '9px Arial';
      ctx.fillStyle = type.color === 'rainbow' ? '#ffffff' : type.color;
      ctx.fillText(type.label, x, y + POWERUP_RADIUS + 9);
      ctx.restore();
    }

    // --- Black hole visual + effect ---
    function updateAndDrawBlackHole() {
      if (!blackHoleActive) return;
      const now = performance.now();
      const cx = blackHoleX, cy = blackHoleY;
      const pullR = 200;

      // Draw
      ctx.save();
      const bhg = ctx.createRadialGradient(cx, cy, 5, cx, cy, pullR);
      bhg.addColorStop(0, 'rgba(0,0,0,1)');
      bhg.addColorStop(0.3, 'rgba(80,0,140,0.6)');
      bhg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bhg;
      ctx.beginPath(); ctx.arc(cx, cy, pullR, 0, Math.PI * 2); ctx.fill();
      // Spinning ring
      ctx.strokeStyle = `rgba(160,0,255,${0.4 + 0.3 * Math.sin(now * 0.005)})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // Pull enemies toward black hole + damage them
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const ex = e.x + ENEMY_SIZE / 2, ey = e.y + ENEMY_SIZE / 2;
        const dx = cx - ex, dy = cy - ey;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pullR) {
          const force = (1 - dist / pullR) * 3;
          e.x += (dx / dist) * force;
          e.y += (dy / dist) * force;
          if (dist < 35) {
            spawnExplosion(ex, ey);
            score += isScoreBoost() ? 20 : 10;
            enemies.splice(i, 1);
          }
        }
      }
    }

    // --- Active effects HUD (bottom-left bars) ---
    function drawActiveEffectsHUD() {
      const now = performance.now();

      if (now < rainbowEnd)    active.push({ label: 'RAINBOW',     end: rainbowEnd,    dur: RAINBOW_DURATION,    color: '#ff88ff' });
      if (now < rapidFireEnd)  active.push({ label: 'RAPID FIRE',  end: rapidFireEnd,  dur: RAPIDFIRE_DURATION,  color: '#00ff88' });
      if (now < tripleShotEnd) active.push({ label: 'TRIPLE SHOT', end: tripleShotEnd, dur: TRIPLESHOT_DURATION, color: '#ff8800' });
      if (now < speedBoostEnd) active.push({ label: 'SPEED BOOST', end: speedBoostEnd, dur: SPEEDBOOST_DURATION, color: '#ffffff' });
      if (now < freezeEnd)     active.push({ label: 'FREEZE',      end: freezeEnd,     dur: FREEZE_DURATION,     color: '#44ddff' });
      if (now < magnetEnd)     active.push({ label: 'MAGNET',      end: magnetEnd,     dur: MAGNET_DURATION,     color: '#ffee00' });
      if (now < scoreBoostEnd) active.push({ label: 'SCORE x2',    end: scoreBoostEnd, dur: SCOREBOOST_DURATION, color: '#ffd700' });
      if (blackHoleActive)     active.push({ label: 'BLACK HOLE',  end: now + blackHoleTimer, dur: BLACKHOLE_DURATION, color: '#aa44ff' });
      if (active.length === 0) return;

      const BAR_W = 70, BAR_H = 6, GAP = 26, startY = canvas.height - 22;
      let ox = 12;
      ctx.save();
      for (const fx of active) {
        const frac = Math.max(0, Math.min(1, (fx.end - now) / fx.dur));
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(ox, startY - BAR_H, BAR_W, BAR_H);
        ctx.fillStyle = fx.color;
        ctx.fillRect(ox, startY - BAR_H, BAR_W * frac, BAR_H);
        ctx.strokeStyle = fx.color; ctx.lineWidth = 0.5;
        ctx.strokeRect(ox, startY - BAR_H, BAR_W, BAR_H);
        ctx.fillStyle = fx.color;
        ctx.font = '9px Arial'; ctx.textBaseline = 'bottom'; ctx.textAlign = 'left';
        ctx.fillText(fx.label, ox, startY - BAR_H - 1);
        ox += BAR_W + GAP;
      }
      ctx.restore();
    }

    function drawBoss() {

    // --- Particles ---
    const particles = [];
    const PARTICLE_COLORS = ['#ff6600', '#ff3300', '#ff9900', '#ffcc00', '#ff4444'];

    function spawnExplosion(cx, cy) {
      const count = 18;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.4;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: 2 + Math.random() * 2.5,
          alpha: 1,
          decay: 0.025 + Math.random() * 0.02,
          color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)]
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96; // slight drag
        p.vy *= 0.96;
        p.alpha -= p.decay;
        if (p.alpha <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function updateAndDrawAsteroids() {

        ast.y += ast.speed; ast.rot += ast.rotSpeed;
        if (ast.y - ast.r > canvas.height) { ast.y = -ast.r; ast.x = Math.random() * canvas.width; }
        ctx.save(); ctx.translate(ast.x, ast.y); ctx.rotate(ast.rot);
        const rg = ctx.createRadialGradient(0, 0, ast.r * 0.1, 0, 0, ast.r);
        rg.addColorStop(0, '#8a7060'); rg.addColorStop(1, '#3a2a1a');
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ast.verts[0].a) * ast.r * ast.verts[0].d, Math.sin(ast.verts[0].a) * ast.r * ast.verts[0].d);
        for (let i = 1; i < ast.verts.length; i++)
          ctx.lineTo(Math.cos(ast.verts[i].a) * ast.r * ast.verts[i].d, Math.sin(ast.verts[i].a) * ast.r * ast.verts[i].d);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(200,180,140,0.3)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();
      }
    }

        ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        star.y += star.speed;

      // Hyperspace streaks use stars
      for(const star of stars){
        ctx.save();ctx.globalAlpha=star.alpha*0.8;ctx.strokeStyle='#ffffff';ctx.lineWidth=star.r*0.5;
        ctx.beginPath();ctx.moveTo(star.x,star.y);ctx.lineTo(star.x,star.y+star.speed*18);ctx.stroke();
        star.y+=star.speed*3;if(star.y>canvas.height){star.y=0;star.x=Math.random()*canvas.width;}
        ctx.restore();
      }
    }

    // Master background dispatcher
    function drawBackground() {
      const now = performance.now();
      const theme = ((level - 1) % 8) + 1;
      if (theme === 1) drawBgLevel1(now);
      else if (theme === 2) drawBgLevel2(now);
      else if (theme === 3) drawBgLevel3(now);
      else if (theme === 4) drawBgLevel4(now);
      else if (theme === 5) drawBgLevel5(now);
      else if (theme === 6) drawBgLevel6(now);
      else if (theme === 7) drawBgLevel7(now);
      else drawBgLevel8(now);
    }

    function drawStars() { /* handled inside drawBackground */ }

    function drawPlayer() {
      const { x, y, width, height } = player;
      const now = performance.now();

      ctx.save();

      // --- Engine flames (drawn behind the ship) ---
      const flicker1 = 0.7 + 0.3 * Math.sin(now * 0.025);
      const flicker2 = 0.7 + 0.3 * Math.sin(now * 0.031 + 1.2);
      const flameBase = y + height * 0.35;
      const flameLen  = height * 0.55;

      // Left engine flame
      const lx = x - width * 0.18;
      const lFlame = ctx.createRadialGradient(lx, flameBase, 1, lx, flameBase + flameLen * flicker1, flameLen * flicker1);
      lFlame.addColorStop(0, 'rgba(255,255,180,0.95)');
      lFlame.addColorStop(0.3, 'rgba(255,140,0,0.8)');
      lFlame.addColorStop(0.7, 'rgba(255,40,0,0.4)');
      lFlame.addColorStop(1, 'rgba(100,0,200,0)');
      ctx.fillStyle = lFlame;
      ctx.beginPath();
      ctx.ellipse(lx, flameBase + flameLen * flicker1 * 0.5, width * 0.1, flameLen * flicker1 * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Right engine flame
      const rx = x + width * 0.18;
      const rFlame = ctx.createRadialGradient(rx, flameBase, 1, rx, flameBase + flameLen * flicker2, flameLen * flicker2);
      rFlame.addColorStop(0, 'rgba(255,255,180,0.95)');
      rFlame.addColorStop(0.3, 'rgba(255,140,0,0.8)');
      rFlame.addColorStop(0.7, 'rgba(255,40,0,0.4)');
      rFlame.addColorStop(1, 'rgba(100,0,200,0)');
      ctx.fillStyle = rFlame;
      ctx.beginPath();
      ctx.ellipse(rx, flameBase + flameLen * flicker2 * 0.5, width * 0.1, flameLen * flicker2 * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // --- Ship glow ---
      ctx.shadowColor = '#00ccff';
      ctx.shadowBlur = 18;

      // --- Ship image ---
      if (shipImg.complete && shipImg.naturalWidth > 0) {
        ctx.drawImage(shipImg, x - width / 2, y - height / 2, width, height);
      } else {
        ctx.beginPath();
        ctx.moveTo(x, y - height / 2);
        ctx.lineTo(x - width / 2, y + height / 2);
        ctx.lineTo(x + width / 2, y + height / 2);
        ctx.closePath();
        ctx.fillStyle = '#00eaff';
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.restore();
    }
    let lastFrameTime = performance.now();
    function update() {
      const now = performance.now();
      const dt = now - lastFrameTime;
      lastFrameTime = now;

      // Movement (speed boost applies)
      const spd = isSpeedBoost() ? player.speed * 1.5 : player.speed;
      if (keys['ArrowLeft'])  player.x -= spd;
      if (keys['ArrowRight']) player.x += spd;

      // Keep ship within canvas bounds
      const halfW = player.width / 2;
      if (player.x - halfW < 0)            player.x = halfW;
      if (player.x + halfW > canvas.width) player.x = canvas.width - halfW;

      // Shooting
      const activeCooldown = isRapidFire() ? SHOOT_COOLDOWN / 2 : SHOOT_COOLDOWN;
      if (keys[' '] && now - lastShotTime >= activeCooldown) {
        if (isTripleShot()) {
          // Three bullets in a spread
          const spread = 12;
          bullets.push({ x: player.x - spread, y: player.y - player.height / 2, vx: -1.5 });
          bullets.push({ x: player.x,           y: player.y - player.height / 2, vx: 0   });
          bullets.push({ x: player.x + spread, y: player.y - player.height / 2, vx: 1.5 });
        } else {
          bullets.push({ x: player.x, y: player.y - player.height / 2, vx: 0 });
        }
        lastShotTime = now;
        playShootSound();
      }

      // --- Centralized power-up spawner ---
      if (!activePowerUp) {
        if (nextPowerUpTime < 0) schedulNextPowerUp(); // first-time init
        if (now >= nextPowerUpTime) spawnPowerUp();
      }

      // Move active power-up, apply magnet attraction, collect
      if (activePowerUp) {
        const p = activePowerUp;

        // Magnet: attract toward player
        if (isMagnet()) {
          const dx = player.x - p.x, dy = player.y - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > 1) { p.x += (dx/dist)*4; p.y += (dy/dist)*4; }
        } else {
          p.y += POWERUP_SPEED;
        }

        // Off-screen → schedule next
        if (p.y - POWERUP_RADIUS > canvas.height) {
          activePowerUp = null;
          schedulNextPowerUp();
        } else {
          // Collect check
          const nearX = Math.max(player.x - player.width/2,  Math.min(p.x, player.x + player.width/2));
          const nearY = Math.max(player.y - player.height/2, Math.min(p.y, player.y + player.height/2));
          const dx = p.x - nearX, dy = p.y - nearY;
          if (dx*dx + dy*dy <= POWERUP_RADIUS*POWERUP_RADIUS) {
            collectPowerUp(p.type);
            activePowerUp = null;
            schedulNextPowerUp();
          }
        }
      }

      // Black hole tick
      if (blackHoleActive) {
        blackHoleTimer -= dt;
        if (blackHoleTimer <= 0) blackHoleActive = false;
      }

      // Recalculate level from score
      level = getLevel();

      // Spawn enemies (interval shrinks with level)
      if (now - lastSpawnTime >= currentSpawnInterval()) {
        enemies.push({
          x: Math.random() * (canvas.width - ENEMY_SIZE),
          y: -ENEMY_SIZE  // start just above the canvas
        });
        lastSpawnTime = now;
      }

      // Spawn boss every 30 seconds (if not already on screen)
      if (!boss && now - lastBossTime >= BOSS_INTERVAL) {
        spawnBoss();
        lastBossTime = now;
      }

      // Move boss downward
      if (boss) {
        boss.y += BOSS_SPEED;
        // Boss reaches the bottom → lose a life
        if (boss.y > canvas.height) {
          boss = null;
          lives--;
          if (lives <= 0) { lives = 0; gameOver = true; stopBGM(); }
        }
      }

      // Collision detection: bullet vs boss
      if (boss) {
        const bcx = boss.x + BOSS_SIZE / 2;
        const bcy = boss.y + BOSS_SIZE / 2;
        const brad = BOSS_SIZE / 2;
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          const dx = b.x - bcx;
          const dy = b.y - bcy;
          if (Math.sqrt(dx * dx + dy * dy) <= brad) {
            bullets.splice(bi, 1);
            boss.hp--;
            if (boss.hp <= 0) {
              spawnExplosion(bcx, bcy);
              spawnExplosion(bcx - 15, bcy + 10);
              spawnExplosion(bcx + 15, bcy - 10);
              score += isScoreBoost() ? 100 : 50;
              boss = null;
            }
            break;
          }
        }
      }

      // Move enemies downward (frozen = 40% speed); lose a life if one reaches the bottom
      const eFreezeMultiplier = isFreeze() ? 0.4 : 1.0;
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += currentEnemySpeed() * eFreezeMultiplier;
        if (enemies[i].y > canvas.height) {
          enemies.splice(i, 1);
          lives--;
          if (lives <= 0) {
            lives = 0;
            gameOver = true;
            stopBGM();
          }
        }
      }

      // Collision detection: bullet vs enemy (AABB)
      for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (
            b.x >= e.x &&
            b.x <= e.x + ENEMY_SIZE &&
            b.y >= e.y &&
            b.y <= e.y + ENEMY_SIZE
          ) {
            bullets.splice(bi, 1);  // remove bullet
            const cx = e.x + ENEMY_SIZE / 2;
            const cy = e.y + ENEMY_SIZE / 2;
            enemies.splice(ei, 1);  // remove enemy
            score += isScoreBoost() ? 20 : 10;  // double if score boost active
            spawnExplosion(cx, cy); // 💥 particles
            playExplosionSound();   // 💥 sound
            break; // this bullet is gone, no need to check other enemies
          }
        }
      }

      // Move bullets upward (with optional horizontal spread) and remove off-screen
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= BULLET_SPEED;
        if (bullets[i].vx) bullets[i].x += bullets[i].vx;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      // Update particles
      updateParticles();
    }

    // --- Game loop ---
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();

      if (!gameOver) {
        update();
        updateAndDrawBlackHole();
        drawEnemies();
        drawBoss();
        drawPowerUps();
        drawBullets();
        drawParticles();
        drawPlayer();
        drawActiveEffectsHUD();
        drawScore();
        drawLevel();
        drawLives();
      } else {
        drawEnemies();
        drawBoss();
        drawPowerUps();
        drawBullets();
        drawParticles();
        drawPlayer();
        drawGameOver();
      }

      requestAnimationFrame(gameLoop);
    }

    // Initial resize then start
    resizeCanvas();
    gameLoop();
  </script>
</body>
